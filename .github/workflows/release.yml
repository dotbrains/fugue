name: release

# Publish the fugue image to GHCR on a pushed version tag.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# A `-rc` tag (e.g. v0.1.0-rc.1) publishes the versioned tags but NOT `latest`.
# See docs/releasing.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  packages: write # push to GHCR

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/dotbrains/fugue

jobs:
  publish:
    name: build and publish to GHCR
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-rc') }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-rc') }}

  homebrew:
    name: publish Homebrew formula
    needs: publish
    # Only stable tags update the tap; -rc prereleases don't.
    if: ${{ !contains(github.ref, '-rc') }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Render the formula for this tag
        id: render
        run: |
          version="${GITHUB_REF_NAME#v}"
          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          curl -fsSL "$url" -o source.tar.gz
          sha="$(sha256sum source.tar.gz | cut -d ' ' -f1)"
          # Overwrite the placeholder url/sha256 in the committed template.
          sed -e "s#^  url .*#  url \"${url}\"#" \
              -e "s#^  sha256 .*#  sha256 \"${sha}\"#" \
              Formula/fugue.rb >rendered.rb
          echo "version=${version}" >>"$GITHUB_OUTPUT"
          echo "fugue ${version} → sha256 ${sha}"

      - name: Push to dotbrains/homebrew-tap
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping the tap publish." >&2
            echo "Add a repo secret with push access to dotbrains/homebrew-tap." >&2
            exit 0
          fi
          git clone --depth 1 \
            "https://x-access-token:${TOKEN}@github.com/dotbrains/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp rendered.rb tap/Formula/fugue.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/fugue.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date; nothing to publish."
            exit 0
          fi
          git commit -m "fugue ${{ steps.render.outputs.version }}"
          git push
