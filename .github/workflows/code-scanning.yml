name: code-scanning

# Static analysis for fugue's shell launcher and container image:
#   - actionlint - lints the workflow YAML under .github/workflows/.
#   - gitleaks   - scans the repository and its history for committed secrets.
# CodeQL is intentionally omitted: it has no first-class shell support, and its
# SARIF upload requires GitHub Advanced Security, which is not enabled here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Run actionlint
        # Configuration (the Blacksmith runner labels) lives in
        # .github/actionlint.yaml.
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  gitleaks:
    name: gitleaks
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: "8.21.2"
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so the scan covers every commit, not just the tip.
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --no-banner --redact --source .
