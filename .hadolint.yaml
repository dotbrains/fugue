# hadolint configuration for the fugue image.
#
# Fail the build on warnings and above. The agent CLIs, su-exec source, and base
# image are pinned (see the Dockerfile), so only the apt version-pin rule is
# ignored — Debian drops old package versions from the repo, which makes pinning
# them a recurring build-breaker for no reproducibility gain over the base digest.
failure-threshold: warning

ignored:
  - DL3008 # apt-get install without an explicit version pin (see note above)
