# hadolint configuration for the fugue image.
#
# Fail the build on warnings and above, but ignore the version-pinning rules:
# the Dockerfile deliberately floats the agent CLI and apt package versions in
# the scaffold ("Pin in CI; floating here") and pins them at release time.
failure-threshold: warning

ignored:
  - DL3008 # apt-get install without an explicit version pin
  - DL3016 # npm install -g without an explicit version pin
